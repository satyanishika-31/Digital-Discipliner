<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            background-color: black;
            overflow-x: hidden;
        }

        /* The background layer */
  .bg-image-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(to right, rgba(0, 0, 0, 0.385) 30%, rgba(0, 0, 0, 0.955)),
              url('p4.png');
  background-size: contain;       /* ensures image doesn't stretch */
  background-repeat: no-repeat;   /* prevents tiling */
  background-position: center; /* aligns image to the left */
  z-index: -1;
}


        /* Set to -1 so it is always behind everything */
        

        .navbar {
            width: 100%;
            background-color: rgba(8, 8, 8, 0.95);
            color: #c46210;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 25px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            color: rgb(249, 247, 247);
            text-decoration: none;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #c46210;
        }

        .shadow-orange {
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .custom-input:focus {
            border-color: #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }
    </style>
</head>

<body>
    <div class="bg-image-overlay"></div>
         <nav class="navbar relative z-50">
        <div class="logo">Digital Discipliner</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="habit.html">Habit</a></li>
        </ul>
    </nav>



    <main class="relative z-10 flex flex-col lg:flex-row min-h-[calc(100vh-80px)] w-full">
        <div class="hidden lg:flex flex-1 flex-col justify-center p-20">
            <h1 class="text-8xl font-black text-white/10 tracking-tighter leading-none">
                Digital<br><span class="text-orange-500/20">Discipline</span>
            </h1>
        </div>

        <div
            class="w-full lg:max-w-[450px] bg-black/80 backdrop-blur-xl border-l border-white/10 p-10 md:p-16 flex flex-col justify-center shadow-orange">
            <div class="mb-12">
                <div class="h-1 w-12 bg-orange-500 mb-6"></div>
                <h2 class="text-4xl font-black text-white tracking-tight uppercase">Login</h2>
                <p id="status-label" class="text-zinc-500 mt-2 font-medium">Please enter your credentials.</p>
            </div>


            <form onsubmit="handleLogin(event)">
                <input type="email" name="email" required
                    class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg text-white mb-4"
                    placeholder="Email">
                <input type="password" name="password" required
                    class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg text-white mb-6"
                    placeholder="Password">

                <button type="submit"
                    class="w-full bg-orange-500 py-4 rounded-lg text-black font-black uppercase hover:bg-orange-400 transition">
                    Access Account
                </button>
            </form>

            <div class="mt-8 text-center">
                <button type="button" onclick="window.location.href='signin.html'"
                    class="text-zinc-500 hover:text-orange-500 text-sm font-bold">
                    Don't have an account? Sign Up
                </button>
            </div>

            <div class="mt-10 pt-10 border-t border-white/5 text-center text-sm">
                <span class="text-zinc-500">Don't have an account?</span>
                <a href="signin.html" class="text-white font-bold ml-1 hover:text-orange-500 transition">Sign Up</a>
            </div>
        </div>
    </main>

    <script src="login.js"></script>
</body>

</html>
