<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker | Dark Orange</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #050505;
      color: #e5e5e5;
      font-family: 'Inter', sans-serif;
    }

    .grid-cube {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      transition: all 0.15s ease;
    }

    .cube-empty {
      background-color: #27272a;
      /* Zinc-800 for better contrast */
    }

    .cube-active {
      background-color: #ff8c00;
      box-shadow: 0 0 10px rgba(255, 140, 0, 0.4);
    }

    .cube-empty:hover {
      background-color: #3f3f46;
    }

    .orange-text {
      color: #ff8c00;
    }

    input:focus {
      outline: none;
      border-color: #ff8c00;
    }

    /* Navigation Bar */
    .navbar {
      width: 100%;
      background-color: #08080800;
      color: #c46210;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      font-size: 25px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
    }

    .nav-links li {
      margin-left: 30px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .nav-links a:hover {
      color: #c46210;
    }
  </style>
</head>

<body class="p-2 md:p-1">

  <nav class="navbar">
    <div class="logo">Habit Tracker</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="habit.html" target="_top">Habit</a></li>
    </ul>
  </nav>

  <div class="max-w-5xl mx-auto">
    <header class="mb-12">
      <h1 class="text-4xl font-black tracking-tighter mb-2">TRACKING <span class="orange-text">SYSTEM</span></h1>
      <p class="text-zinc-500">Visualizing user consistency and task completion.</p>
    </header>

    <div
      class="flex gap-2 mb-10 bg-zinc-900 p-2 rounded-lg border border-zinc-800 focus-within:border-orange-500 transition shadow-xl">
      <input type="text" id="taskInput" placeholder="Enter new task name..."
        class="bg-transparent flex-1 px-4 py-2 text-white placeholder-zinc-600">
      <button onclick="handleAddTask()"
        class="bg-[#ff8c00] text-black px-6 py-2 rounded font-bold hover:bg-orange-400 active:scale-95 transition">
        ADD TASK
      </button>
    </div>

    <div id="dashboard" class="space-y-6">
    </div>
  </div>

<script>
    const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    let userEmail = ""; 
    let tasks = [];

    // 1. INITIALIZE EVERYTHING
    async function initialize() {
      const response = await fetch('/api/user-info');
      if (response.ok) {
        const data = await response.json();
        if (data.email) {
          userEmail = data.email;
          localStorage.setItem('userEmail', data.email);
          localStorage.setItem('userName', data.name);
          await loadFromDatabase();
        } else {
          window.location.replace('login.html');
        }
      } else {
        window.location.replace('login.html');
      }
    }

    // 2. LOAD DATA FROM DATABASE
    async function loadFromDatabase() {
      try {
        const response = await fetch(`/api/habits/${userEmail}`);
        if (response.ok) {
          const dbData = await response.json();
          
          // Get unique task names
          const uniqueTaskNames = [...new Set(dbData.map(item => item.taskName))];

          // Create task objects
          tasks = uniqueTaskNames.map((name, index) => ({
            id: index + 1,
            name: name,
            progress: {} 
          }));

          // Fill progress (Day 0 is just for initialization, Day 1-31 are active)
          dbData.forEach(entry => {
            const task = tasks.find(t => t.name === entry.taskName);
            if (task && entry.dayVal > 0) {
              if (!task.progress[entry.monthName]) task.progress[entry.monthName] = [];
              task.progress[entry.monthName].push(entry.dayVal);
            }
          });

          renderDashboard();
        }
      } catch (err) {
        console.error("Database Load Error:", err);
      }
    }

    // 3. ADD NEW TASK (The Missing Link)
    async function handleAddTask() {
      const input = document.getElementById('taskInput');
      const taskName = input.value.trim();
      
      if (taskName === "") return;
      if (tasks.some(t => t.name.toLowerCase() === taskName.toLowerCase())) {
        alert("Task already exists!");
        return;
      }

      // We send Day 0 to the database. 
      // This tells Java to create the task without marking a specific day yet.
      const payload = {
        email: userEmail,
        taskName: taskName,
        month: "JAN", 
        day: 0 
      };

      try {
        const response = await fetch('/api/habits/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          input.value = "";
          await loadFromDatabase(); // Refresh to show the new empty calendar
        }
      } catch (err) {
        console.error("Error adding task:", err);
      }
    }

    // 4. TOGGLE DATE
    async function toggleDate(taskId, month, day) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      const payload = {
        email: userEmail,
        taskName: task.name,
        month: month,
        day: day
      };

      try {
        const response = await fetch('/api/habits/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          if (!task.progress[month]) task.progress[month] = [];
          const index = task.progress[month].indexOf(day);
          if (index > -1) {
            task.progress[month].splice(index, 1);
          } else {
            task.progress[month].push(day);
          }
          renderDashboard();
        }
      } catch (err) {
        alert("Could not save to database.");
      }
    }

    // 5. RENDER UI
    function renderDashboard() {
      const container = document.getElementById('dashboard');
      container.innerHTML = '';

      tasks.forEach(task => {
        let taskHtml = `
          <div class="bg-[#0f0f0f] p-5 rounded-xl border border-zinc-800 group mb-6">
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-lg font-medium text-zinc-200 tracking-wide">${task.name}</h2>
              <button onclick="deleteTask(${task.id}, '${task.name}')" 
                      class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-500 transition text-xs font-bold">
                  REMOVE
              </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
        `;

        months.forEach(month => {
          taskHtml += `
            <div class="flex items-start gap-3">
              <span class="text-[10px] font-bold text-zinc-600 w-8 mt-1">${month}</span>
              <div class="flex flex-wrap gap-1">`;

          for (let i = 1; i <= 31; i++) {
            const isActive = task.progress[month]?.includes(i);
            taskHtml += `<div class="grid-cube ${isActive ? 'cube-active' : 'cube-empty'} cursor-pointer" 
                         onclick="toggleDate(${task.id}, '${month}', ${i})"></div>`;
          }
          taskHtml += `</div></div>`;
        });

        taskHtml += `</div></div>`;
        container.innerHTML += taskHtml;
      });
    }

    // 6. DELETE TASK
    async function deleteTask(id, taskName) {
      if (!confirm(`Permanently delete "${taskName}"?`)) return;

      try {
        const response = await fetch(`/api/habits/delete?email=${userEmail}&taskName=${encodeURIComponent(taskName)}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          tasks = tasks.filter(t => t.id !== id);
          renderDashboard();
        }
      } catch (err) {
        console.error("Delete error:", err);
      }
    }

    window.onload = initialize;
  </script>
</body>

</html>
