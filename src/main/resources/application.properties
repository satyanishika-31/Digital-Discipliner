spring.application.name=habit
server.port=${PORT:8081}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Database Configuration - Uses environment variables for security
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/habit_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:nishika0205}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
spring.datasource.hikari.auto-commit=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect