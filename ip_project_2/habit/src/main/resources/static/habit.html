<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker | Dark Orange</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #050505;
      color: #e5e5e5;
      font-family: 'Inter', sans-serif;
    }

    .grid-cube {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      transition: all 0.15s ease;
    }

    .cube-empty {
      background-color: #27272a;
      /* Zinc-800 for better contrast */
    }

    .cube-active {
      background-color: #ff8c00;
      box-shadow: 0 0 10px rgba(255, 140, 0, 0.4);
    }

    .cube-empty:hover {
      background-color: #3f3f46;
    }

    .orange-text {
      color: #ff8c00;
    }

    input:focus {
      outline: none;
      border-color: #ff8c00;
    }

    /* Navigation Bar */
    .navbar {
      width: 100%;
      background-color: #08080800;
      color: #c46210;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar .logo {
      font-size: 25px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
    }

    .nav-links li {
      margin-left: 30px;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .nav-links a:hover {
      color: #c46210;
    }
  </style>
</head>

<body class="p-2 md:p-1">

  <nav class="navbar">
    <div class="logo">Habit Tracker</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="habit.html" target="_top">Habit</a></li>
    </ul>
  </nav>

  <div class="max-w-5xl mx-auto">
    <header class="mb-12">
      <h1 class="text-4xl font-black tracking-tighter mb-2">TRACKING <span class="orange-text">SYSTEM</span></h1>
      <p class="text-zinc-500">Visualizing user consistency and task completion.</p>
    </header>

    <div
      class="flex gap-2 mb-10 bg-zinc-900 p-2 rounded-lg border border-zinc-800 focus-within:border-orange-500 transition shadow-xl">
      <input type="text" id="taskInput" placeholder="Enter new task name..."
        class="bg-transparent flex-1 px-4 py-2 text-white placeholder-zinc-600">
      <button onclick="handleAddTask()"
        class="bg-[#ff8c00] text-black px-6 py-2 rounded font-bold hover:bg-orange-400 active:scale-95 transition">
        ADD TASK
      </button>
    </div>

    <div id="dashboard" class="space-y-6">
    </div>
  </div>

  <script>
    // 1. Security Guard
    if (!localStorage.getItem('userEmail')) {
      window.location.replace('login.html');
    }

    const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    const userEmail = localStorage.getItem('userEmail');
    let tasks = [];

    // 2. LOAD DATA FROM DATABASE
    async function loadFromDatabase() {
      try {
        const response = await fetch(`http://localhost:8081/api/habits/${userEmail}`);
        if (response.ok) {
          const dbData = await response.json();
          const uniqueTaskNames = [...new Set(dbData.map(item => item.taskName))];

          if (uniqueTaskNames.length === 0) {
            tasks = [{ id: Date.now(), name: "Project Development", progress: {} }];
          } else {
            tasks = uniqueTaskNames.map((name, index) => ({
              id: index + 1,
              name: name,
              progress: {}
            }));
          }

          dbData.forEach(entry => {
            const task = tasks.find(t => t.name === entry.taskName);
            if (task) {
              if (!task.progress[entry.monthName]) task.progress[entry.monthName] = [];
              task.progress[entry.monthName].push(entry.dayVal);
            }
          });
          renderDashboard();
        }
      } catch (err) {
        console.error("Could not connect to server:", err);
      }
    }

    // 3. TOGGLE DATE (Syncs with Java)
    async function toggleDate(taskId, month, day) {
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;

      const payload = {
        email: userEmail,
        taskName: task.name,
        month: month,
        day: day
      };

      try {
        const response = await fetch('http://localhost:8081/api/habits/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          if (!task.progress[month]) task.progress[month] = [];
          const index = task.progress[month].indexOf(day);
          if (index > -1) {
            task.progress[month].splice(index, 1);
          } else {
            task.progress[month].push(day);
          }
          renderDashboard();
        }
      } catch (err) {
        alert("Connection error: Could not save progress.");
      }
    }

    // 4. RENDER UI
    function renderDashboard() {
      const container = document.getElementById('dashboard');
      container.innerHTML = '';

      tasks.forEach(task => {
        let taskHtml = `
                <div class="bg-[#0f0f0f] p-5 rounded-xl border border-zinc-800 group mb-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-medium text-zinc-200 tracking-wide">${task.name}</h2>
                        <button onclick="deleteTask(${task.id}, '${task.name}')" 
                                class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-500 transition text-xs font-bold">
                            REMOVE
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
            `;

        months.forEach(month => {
          taskHtml += `
                    <div class="flex items-start gap-3">
                        <span class="text-[10px] font-bold text-zinc-600 w-8 mt-1">${month}</span>
                        <div class="flex flex-wrap gap-1">`;

          for (let i = 1; i <= 31; i++) {
            const isActive = task.progress[month]?.includes(i);
            taskHtml += `<div class="grid-cube ${isActive ? 'cube-active' : 'cube-empty'} cursor-pointer" 
                                     onclick="toggleDate(${task.id}, '${month}', ${i})"></div>`;
          }
          taskHtml += `</div></div>`;
        });

        taskHtml += `</div></div>`;
        container.innerHTML += taskHtml;
      });
    }

    function handleAddTask() {
      const input = document.getElementById('taskInput');
      const taskName = input.value.trim();
      if (taskName !== "") {
        if (tasks.some(t => t.name === taskName)) {
          alert("Task already exists!");
          return;
        }
        tasks.unshift({ id: Date.now(), name: taskName, progress: {} });
        input.value = "";
        renderDashboard();
      }
    }

    // 5. DELETE FROM DATABASE (Merged version)
    async function deleteTask(id, taskName) {
    if (!confirm(`Permanently delete "${taskName}" and all progress?`)) return;

    try {
        // Only call fetch ONCE inside the try block
        const response = await fetch(`http://localhost:8081/api/habits/delete?email=${userEmail}&taskName=${encodeURIComponent(taskName)}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            // Remove from local array and refresh UI
            tasks = tasks.filter(t => t.id !== id);
            renderDashboard();
        } else {
            alert("Failed to delete from server.");
        }
    } catch (err) {
        console.error("Delete error:", err);
        alert("Server connection error.");
    }
}
    window.onload = loadFromDatabase;
  </script>
</body>

</html>
